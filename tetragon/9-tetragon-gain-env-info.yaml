apiVersion: cilium.io/v1alpha1
kind: TracingPolicyNamespaced
metadata:
  name: "block-environment-reconnaissance"
spec:
  podSelector:
    matchLabels:
      app: system-monitor
  kprobes:
  # Block printenv/env execution - reads environment variables (secrets, tokens, kubeconfig)
  - call: "sys_execve"
    syscall: true
    args:
    - index: 0
      type: "string"
    selectors:
    - matchArgs:
      - index: 0
        operator: "Postfix"
        values:
        - "printenv"
        - "env"
      matchActions:
      - action: Sigkill

  # # Block reads to /proc/self/cgroup - reveals container/resource info
