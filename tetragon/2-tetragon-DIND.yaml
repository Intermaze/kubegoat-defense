apiVersion: cilium.io/v1alpha1
kind: TracingPolicyNamespaced
metadata:
  name: "block-dind-containerd-exploit"
spec:
  podSelector:
    matchLabels:
      app: health-check
  kprobes:

  # Block execution of binaries from /tmp (e.g., crictl, wget payloads)
  - call: "security_bprm_check"
    syscall: false
    args:
    - index: 0
      type: "linux_binprm"
    selectors:
    - matchArgs:
      - index: 0
        operator: "Prefix"
        values:
        - "/tmp/"
        - "/dev/shm/"
      matchActions:
      - action: Sigkill 

