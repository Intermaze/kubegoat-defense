apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: "block-stress-ng"
spec:
  podSelector:
    matchLabels:
      app: hunger-check
  kprobes:

  # Block stress-ng execution (DoS attack tool)
  - call: "sys_execve"
    syscall: true
    args:
    - index: 0
      type: "string"
    selectors:
    - matchArgs:
      - index: 0
        operator: "Postfix"
        values:
        - "stress-ng"
      matchActions:
      - action: Sigkill