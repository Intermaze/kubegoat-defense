apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-check-deployment
spec:
  selector:
    matchLabels:
      app: health-check
  template:
    metadata:
      labels:
        app: health-check
    spec:
      # Init container to detect and link the correct container runtime socket
      initContainers:
      - name: detect-runtime-socket
        image: busybox:latest
        command: 
        - sh
        - -c
        - |
          echo "Detecting container runtime socket..."
          if [ -S /host-root/var/run/cri-dockerd.sock ]; then
            echo "✓ Found cri-dockerd socket at /var/run/cri-dockerd.sock"
            mkdir -p /socket-link
            ln -sf /host-root/var/run/cri-dockerd.sock /socket-link/container.sock
          elif [ -S /host-root/run/containerd/containerd.sock ]; then
            echo "✓ Found containerd socket at /run/containerd/containerd.sock"
            mkdir -p /socket-link
            ln -sf /host-root/run/containerd/containerd.sock /socket-link/container.sock
          elif [ -S /host-root/var/run/docker.sock ]; then
            echo "✓ Found docker socket at /var/run/docker.sock"
            mkdir -p /socket-link
            ln -sf /host-root/var/run/docker.sock /socket-link/container.sock
          elif [ -S /host-root/run/docker.sock ]; then
            echo "✓ Found docker socket at /run/docker.sock"
            mkdir -p /socket-link
            ln -sf /host-root/run/docker.sock /socket-link/container.sock
          else
            echo "⚠ Warning: No container runtime socket found!"
            echo "  Checked paths:"
            echo "  - /var/run/cri-dockerd.sock"
            echo "  - /run/containerd/containerd.sock"
            echo "  - /var/run/docker.sock"
            echo "  - /run/docker.sock"
            echo "  Application may fail if it requires socket access"
            mkdir -p /socket-link
          fi
          echo "Socket detection completed"
        volumeMounts:
        - name: host-root
          mountPath: /host-root
          readOnly: true
        - name: socket-link
          mountPath: /socket-link
        securityContext:
          privileged: true
      containers:
      - name: health-check
        image: madhuakula/k8s-goat-health-check
        resources:
          limits:
            memory: "100Mi"
            cpu: "30m"
        ports:
        - containerPort: 80
      # Custom Stuff
        securityContext:
          privileged: true
        volumeMounts:
          # Mount host root to detect and access socket via symlink
          - mountPath: /host-root
            name: host-root
            readOnly: true
          # Socket symlinks created by init container
          - mountPath: /socket-link
            name: socket-link
          # Direct mount of cri-dockerd socket to standard location
          - mountPath: /custom/containerd/containerd.sock
            name: cri-dockerd-sock-volume-fallback
          # Direct mount of containerd socket for backward compatibility
          - mountPath: /run/containerd/containerd.sock
            name: containerd-sock-volume-fallback
      volumes:
        # Host mount for init container detection
        - name: host-root
          hostPath:
            path: /
            type: Directory
        # Symlinks to the host systems container management sockets
        - name: socket-link
          emptyDir: {}
        # Direct mount of cri-dockerd socket (Kubernetes 1.24+)
        - name: cri-dockerd-sock-volume-fallback
          hostPath:
            path: /var/run/cri-dockerd.sock
            type: Socket
        # Direct mount of containerd socket
        - name: containerd-sock-volume-fallback
          hostPath:
            path: /run/containerd/containerd.sock
            type: Socket
---
apiVersion: v1
kind: Service
metadata:
  name: health-check-service
spec:
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  selector:
    app: health-check
